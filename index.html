<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Тесты</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f6f8;
      --surface: #ffffff;
      --surface-2: #eef3f7;
      --text: #1f2933;
      --muted: #667586;
      --border: #d8e0e7;
      --accent: #1f7a8c;
      --accent-dark: #155e6e;
      --correct: #19744b;
      --correct-bg: #e4f5ec;
      --wrong: #b73535;
      --wrong-bg: #fde8e8;
      --focus: rgba(31, 122, 140, 0.22);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
    }

    button,
    input {
      font: inherit;
    }

    .is-hidden {
      display: none !important;
    }

    .start-screen {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .start-panel {
      width: min(720px, 100%);
      display: grid;
      gap: 18px;
      padding: 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 10px 28px rgba(31, 41, 51, 0.06);
    }

    .mode-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .mode-btn {
      min-height: 76px;
      display: grid;
      align-content: center;
      justify-items: center;
      gap: 6px;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      background: #fbfcfd;
      color: var(--text);
      cursor: pointer;
      font-weight: 800;
      transition: background-color 140ms ease, border-color 140ms ease, box-shadow 140ms ease;
    }

    .mode-btn:hover,
    .mode-btn:focus-visible {
      border-color: var(--accent);
      background: #ffffff;
      box-shadow: 0 0 0 4px var(--focus);
      outline: none;
    }

    .mode-count {
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
    }

    .mixed-form {
      display: grid;
      gap: 12px;
      padding-top: 2px;
    }

    .number-field {
      display: grid;
      gap: 7px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }

    .scope-field {
      display: grid;
      gap: 8px;
      margin: 0;
      padding: 0;
      border: 0;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }

    .scope-options {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .scope-option {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 42px;
      padding: 9px 10px;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: #fbfcfd;
      color: var(--text);
      font-weight: 700;
      cursor: pointer;
    }

    .scope-option:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px var(--focus);
    }

    .scope-option input {
      width: 16px;
      height: 16px;
      margin: 0;
      accent-color: var(--accent);
    }

    .number-field input {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 10px 12px;
      background: #fbfcfd;
      color: var(--text);
    }

    .number-field input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 4px var(--focus);
    }

    .form-error {
      min-height: 20px;
      color: var(--wrong);
      font-size: 14px;
      font-weight: 700;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 300px;
      gap: 20px;
      padding: 20px;
    }

    .main {
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 16px;
      min-width: 0;
    }

    .topbar,
    .question-panel,
    .nav-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 10px 28px rgba(31, 41, 51, 0.06);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 16px;
    }

    .title {
      display: grid;
      gap: 4px;
      min-width: 0;
    }

    .title h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.2;
      font-weight: 700;
    }

    .meta {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.35;
    }

    .progress {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      white-space: nowrap;
      font-size: 14px;
    }

    .progress strong {
      color: var(--text);
      font-weight: 700;
    }

    .question-panel {
      padding: 22px;
      min-height: 460px;
    }

    .question-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    .question-number {
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .question-text {
      margin: 8px 0 0;
      max-width: 900px;
      font-size: 24px;
      line-height: 1.35;
      font-weight: 700;
    }

    .instruction {
      align-self: flex-start;
      padding: 7px 10px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: #394b5a;
      font-size: 14px;
      line-height: 1.3;
      white-space: nowrap;
    }

    .answers {
      display: grid;
      gap: 10px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .answer {
      display: grid;
      grid-template-columns: 24px minmax(0, 1fr);
      gap: 12px;
      align-items: start;
      padding: 14px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fbfcfd;
      cursor: pointer;
      transition: border-color 140ms ease, background-color 140ms ease, box-shadow 140ms ease;
    }

    .answer:hover {
      border-color: #aab8c4;
      background: #ffffff;
    }

    .answer:focus-within {
      box-shadow: 0 0 0 4px var(--focus);
      border-color: var(--accent);
    }

    .answer input {
      width: 18px;
      height: 18px;
      margin: 2px 0 0;
      accent-color: var(--accent);
    }

    .answer-text {
      min-width: 0;
      font-size: 18px;
      line-height: 1.42;
    }

    .answer.is-correct {
      border-color: rgba(25, 116, 75, 0.38);
      background: var(--correct-bg);
    }

    .answer.is-wrong-selected {
      border-color: rgba(183, 53, 53, 0.42);
      background: var(--wrong-bg);
    }

    .answer-mark {
      display: inline-flex;
      align-items: center;
      margin-left: 8px;
      font-size: 14px;
      font-weight: 700;
    }

    .answer-mark.correct {
      color: var(--correct);
    }

    .answer-mark.wrong {
      color: var(--wrong);
    }

    .result {
      min-height: 28px;
      margin-top: 18px;
      font-size: 17px;
      line-height: 1.45;
      font-weight: 700;
    }

    .result.correct {
      color: var(--correct);
    }

    .result.wrong,
    .result.empty {
      color: var(--wrong);
    }

    .actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0;
    }

    .action-group {
      display: flex;
      gap: 10px;
      min-width: 0;
    }

    .btn {
      min-height: 44px;
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 10px 16px;
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      font-weight: 700;
      transition: background-color 140ms ease, border-color 140ms ease, color 140ms ease;
    }

    .btn:hover {
      border-color: #aab8c4;
      background: #f9fbfc;
    }

    .btn:focus-visible {
      outline: none;
      box-shadow: 0 0 0 4px var(--focus);
      border-color: var(--accent);
    }

    .btn.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #ffffff;
    }

    .btn.primary:hover {
      border-color: var(--accent-dark);
      background: var(--accent-dark);
    }

    .btn:disabled {
      cursor: not-allowed;
      opacity: 0.48;
    }

    .nav-panel {
      align-self: start;
      position: sticky;
      top: 20px;
      max-height: calc(100vh - 40px);
      overflow: auto;
      padding: 16px;
    }

    .nav-title {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .nav-title h2 {
      margin: 0;
      font-size: 18px;
      line-height: 1.25;
    }

    .nav-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 7px;
    }

    .nav-btn {
      min-width: 0;
      height: 38px;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: #fbfcfd;
      color: var(--text);
      cursor: pointer;
      font-weight: 800;
    }

    .nav-btn.current {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--focus);
    }

    .nav-btn.correct {
      border-color: rgba(25, 116, 75, 0.45);
      background: var(--correct-bg);
      color: var(--correct);
    }

    .nav-btn.wrong {
      border-color: rgba(183, 53, 53, 0.45);
      background: var(--wrong-bg);
      color: var(--wrong);
    }

    .legend {
      display: grid;
      gap: 8px;
      margin-top: 16px;
      color: var(--muted);
      font-size: 14px;
    }

    .legend-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: #fbfcfd;
      flex: 0 0 auto;
    }

    .dot.current {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--focus);
    }

    .dot.correct {
      border-color: rgba(25, 116, 75, 0.45);
      background: var(--correct-bg);
    }

    .dot.wrong {
      border-color: rgba(183, 53, 53, 0.45);
      background: var(--wrong-bg);
    }

    @media (max-width: 900px) {
      .app {
        grid-template-columns: 1fr;
        padding: 14px;
      }

      .mode-grid {
        grid-template-columns: 1fr;
      }

      .scope-options {
        grid-template-columns: 1fr;
      }

      .nav-panel {
        position: static;
        max-height: none;
      }

      .nav-grid {
        grid-template-columns: repeat(10, minmax(38px, 1fr));
      }

      .question-head,
      .topbar,
      .actions {
        flex-direction: column;
        align-items: stretch;
      }

      .instruction,
      .progress {
        white-space: normal;
      }
    }

    @media (max-width: 560px) {
      .question-panel {
        padding: 16px;
      }

      .question-text {
        font-size: 20px;
      }

      .answer {
        grid-template-columns: 22px minmax(0, 1fr);
        padding: 12px;
      }

      .answer-text {
        font-size: 16px;
      }

      .nav-grid {
        grid-template-columns: repeat(5, minmax(0, 1fr));
      }

      .action-group,
      .btn {
        width: 100%;
      }

      .action-group {
        display: grid;
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>
<body>
  <section class="start-screen" id="startScreen">
    <div class="start-panel">
      <div class="title">
        <h1>Тренировочный тест</h1>
        <div class="meta" id="startMeta"></div>
      </div>

      <div class="mode-grid" aria-label="Выбор теста">
        <button class="mode-btn" id="testOneBtn" type="button">
          <span>Тест 1</span>
          <span class="mode-count" id="testOneCount"></span>
        </button>
        <button class="mode-btn" id="testTwoBtn" type="button">
          <span>Тест 2</span>
          <span class="mode-count" id="testTwoCount"></span>
        </button>
        <button class="mode-btn" id="mixedBtn" type="button">
          <span>Смешанный тест</span>
          <span class="mode-count" id="mixedCountHint"></span>
        </button>
      </div>

      <form class="mixed-form is-hidden" id="mixedForm">
        <fieldset class="scope-field">
          <legend>Источник вопросов</legend>
          <div class="scope-options">
            <label class="scope-option">
              <input type="radio" name="mixedScope" value="all" checked>
              <span>Все тесты</span>
            </label>
            <label class="scope-option">
              <input type="radio" name="mixedScope" value="test1">
              <span>Только тест 1</span>
            </label>
            <label class="scope-option">
              <input type="radio" name="mixedScope" value="test2">
              <span>Только тест 2</span>
            </label>
          </div>
        </fieldset>
        <label class="number-field" for="mixedCount">
          Количество вопросов
          <input id="mixedCount" type="number" min="0" step="1" inputmode="numeric">
        </label>
        <button class="btn primary" type="submit">Начать тест</button>
        <div class="form-error" id="mixedError" role="alert"></div>
      </form>
    </div>
  </section>

  <div class="app is-hidden" id="testApp">
    <main class="main">
      <header class="topbar">
        <div class="title">
          <h1>Тренировочный тест</h1>
          <div class="meta" id="questionMeta"></div>
        </div>
        <div class="progress" id="progress"></div>
      </header>

      <section class="question-panel" aria-live="polite">
        <div class="question-head">
          <div>
            <div class="question-number" id="questionNumber"></div>
            <p class="question-text" id="questionText"></p>
          </div>
          <div class="instruction" id="instruction"></div>
        </div>

        <ul class="answers" id="answers"></ul>
        <div class="result" id="result"></div>
      </section>

      <footer class="actions">
        <div class="action-group">
          <button class="btn" id="prevBtn" type="button">Назад</button>
          <button class="btn" id="nextBtn" type="button">Далее</button>
        </div>
        <div class="action-group">
          <button class="btn" id="resetBtn" type="button">Сбросить</button>
          <button class="btn primary" id="checkBtn" type="button">Проверить</button>
        </div>
      </footer>
    </main>

    <aside class="nav-panel" aria-label="Навигация по вопросам">
      <div class="nav-title">
        <h2>Вопросы</h2>
        <span class="meta" id="navMeta"></span>
      </div>
      <div class="nav-grid" id="navGrid"></div>
      <div class="legend" aria-hidden="true">
        <div class="legend-row"><span class="dot current"></span><span>Текущий</span></div>
        <div class="legend-row"><span class="dot correct"></span><span>Правильно</span></div>
        <div class="legend-row"><span class="dot wrong"></span><span>Неправильно</span></div>
      </div>
    </aside>
  </div>

  <script>
    const allQuestions = JSON.parse(document.getElementById('questionsData').textContent);
    const TEST_ONE_COUNT = 789;
    const testOneQuestions = allQuestions.slice(0, TEST_ONE_COUNT);
    const testTwoQuestions = allQuestions.slice(TEST_ONE_COUNT);
    let questions = [];
    let state = null;

    function shuffledIndexes(length) {
      const indexes = Array.from({ length }, (_, index) => index);
      for (let index = indexes.length - 1; index > 0; index -= 1) {
        const swapIndex = Math.floor(Math.random() * (index + 1));
        [indexes[index], indexes[swapIndex]] = [indexes[swapIndex], indexes[index]];
      }
      return indexes;
    }

    function createState(activeQuestions, label) {
      return {
        label,
        current: 0,
        questionOrder: shuffledIndexes(activeQuestions.length),
        answerOrders: activeQuestions.map(question => shuffledIndexes(question.answers.length)),
        selections: activeQuestions.map(() => new Set()),
        checked: activeQuestions.map(() => null)
      };
    }

    const els = {
      startScreen: document.getElementById('startScreen'),
      testApp: document.getElementById('testApp'),
      startMeta: document.getElementById('startMeta'),
      testOneBtn: document.getElementById('testOneBtn'),
      testTwoBtn: document.getElementById('testTwoBtn'),
      mixedBtn: document.getElementById('mixedBtn'),
      mixedForm: document.getElementById('mixedForm'),
      mixedCount: document.getElementById('mixedCount'),
      mixedError: document.getElementById('mixedError'),
      mixedScopeInputs: document.querySelectorAll('input[name="mixedScope"]'),
      testOneCount: document.getElementById('testOneCount'),
      testTwoCount: document.getElementById('testTwoCount'),
      mixedCountHint: document.getElementById('mixedCountHint'),
      questionMeta: document.getElementById('questionMeta'),
      progress: document.getElementById('progress'),
      questionNumber: document.getElementById('questionNumber'),
      questionText: document.getElementById('questionText'),
      instruction: document.getElementById('instruction'),
      answers: document.getElementById('answers'),
      result: document.getElementById('result'),
      prevBtn: document.getElementById('prevBtn'),
      nextBtn: document.getElementById('nextBtn'),
      checkBtn: document.getElementById('checkBtn'),
      resetBtn: document.getElementById('resetBtn'),
      navGrid: document.getElementById('navGrid'),
      navMeta: document.getElementById('navMeta')
    };

    function isMultiple(question) {
      return question.instruction.toLowerCase().includes('несколько');
    }

    function getCorrectIndexes(question) {
      return question.answers
        .map((answer, index) => answer.mark === 'правильно' ? index : -1)
        .filter(index => index !== -1);
    }

    function isExactAnswer(question, selected) {
      const correct = getCorrectIndexes(question);
      return selected.size === correct.length && correct.every(index => selected.has(index));
    }

    function getMixedPool() {
      const scope = document.querySelector('input[name="mixedScope"]:checked').value;
      if (scope === 'test1') {
        return { label: 'Смешанный тест · Тест 1', questions: testOneQuestions };
      }
      if (scope === 'test2') {
        return { label: 'Смешанный тест · Тест 2', questions: testTwoQuestions };
      }
      return { label: 'Смешанный тест · Все тесты', questions: allQuestions };
    }

    function updateMixedLimit() {
      const pool = getMixedPool();
      els.mixedCount.max = String(pool.questions.length);
      if (Number(els.mixedCount.value) > pool.questions.length) {
        els.mixedCount.value = String(pool.questions.length);
      }
      els.mixedCountHint.textContent = `до ${pool.questions.length} вопросов`;
      els.mixedError.textContent = '';
    }

    function getRandomQuestions(pool, count) {
      return shuffledIndexes(pool.length)
        .slice(0, count)
        .map(index => pool[index]);
    }

    function startTest(activeQuestions, label) {
      questions = activeQuestions.slice();
      state = createState(questions, label);
      els.startScreen.classList.add('is-hidden');
      els.testApp.classList.remove('is-hidden');
      render();
    }

    function currentQuestionIndex() {
      return state.questionOrder[state.current];
    }

    function renderEmptyTest() {
      els.questionMeta.textContent = `${state.label} · 0 вопросов`;
      els.progress.innerHTML = '<strong>0</strong> правильно · <strong>0</strong> проверено';
      els.navMeta.textContent = '0/0';
      els.questionNumber.textContent = 'Вопросы не выбраны';
      els.questionText.textContent = 'В тесте нет вопросов';
      els.instruction.textContent = '';
      els.instruction.classList.add('is-hidden');
      els.answers.innerHTML = '';
      els.result.className = 'result';
      els.result.textContent = '';
      els.prevBtn.disabled = true;
      els.nextBtn.disabled = true;
      els.checkBtn.disabled = true;
      renderNav();
    }

    function render() {
      if (!state) {
        return;
      }

      if (questions.length === 0) {
        renderEmptyTest();
        return;
      }

      els.instruction.classList.remove('is-hidden');
      els.checkBtn.disabled = false;

      const questionIndex = currentQuestionIndex();
      const question = questions[questionIndex];
      const selected = state.selections[questionIndex];
      const checked = state.checked[questionIndex];
      const inputType = isMultiple(question) ? 'checkbox' : 'radio';
      const checkedCount = state.checked.filter(Boolean).length;
      const answeredCount = state.checked.filter(value => value !== null).length;

      els.questionMeta.textContent = `${state.label} · Вопрос ${state.current + 1} из ${questions.length}`;
      els.progress.innerHTML = `<strong>${checkedCount}</strong> правильно · <strong>${answeredCount}</strong> проверено`;
      els.navMeta.textContent = `${checkedCount}/${questions.length}`;
      els.questionNumber.textContent = `Вопрос ${state.current + 1}`;
      els.questionText.textContent = question.question;
      els.instruction.textContent = question.instruction;

      els.answers.innerHTML = '';
      state.answerOrders[questionIndex].forEach(answerIndex => {
        const answer = question.answers[answerIndex];
        const item = document.createElement('li');
        const label = document.createElement('label');
        const input = document.createElement('input');
        const text = document.createElement('span');

        label.className = 'answer';
        if (checked !== null && answer.mark === 'правильно') {
          label.classList.add('is-correct');
        }
        if (checked !== null && selected.has(answerIndex) && answer.mark !== 'правильно') {
          label.classList.add('is-wrong-selected');
        }

        input.type = inputType;
        input.name = `question-${questionIndex}`;
        input.checked = selected.has(answerIndex);
        input.addEventListener('change', () => {
          if (inputType === 'radio') {
            state.selections[questionIndex] = new Set([answerIndex]);
          } else if (input.checked) {
            state.selections[questionIndex].add(answerIndex);
          } else {
            state.selections[questionIndex].delete(answerIndex);
          }
          state.checked[questionIndex] = null;
          render();
        });

        text.className = 'answer-text';
        text.textContent = answer.text;

        if (checked !== null) {
          const mark = document.createElement('span');
          if (answer.mark === 'правильно') {
            mark.className = 'answer-mark correct';
            mark.textContent = 'правильно';
          } else if (selected.has(answerIndex)) {
            mark.className = 'answer-mark wrong';
            mark.textContent = 'неправильно';
          }
          if (mark.textContent) {
            text.appendChild(mark);
          }
        }

        label.append(input, text);
        item.appendChild(label);
        els.answers.appendChild(item);
      });

      els.result.className = 'result';
      if (checked === true) {
        els.result.classList.add('correct');
        els.result.textContent = 'Правильно';
      } else if (checked === false) {
        els.result.classList.add('wrong');
        els.result.textContent = 'Неправильно';
      } else if (selected.size === 0) {
        els.result.textContent = '';
      } else {
        els.result.textContent = '';
      }

      els.prevBtn.disabled = state.current === 0;
      els.nextBtn.disabled = state.current === questions.length - 1;
      renderNav();
    }

    function renderNav() {
      els.navGrid.innerHTML = '';
      state.questionOrder.forEach((questionIndex, orderIndex) => {
        const question = questions[questionIndex];
        const button = document.createElement('button');
        button.className = 'nav-btn';
        button.type = 'button';
        button.textContent = orderIndex + 1;
        button.title = `Исходный вопрос ${question.question_number}`;
        button.setAttribute('aria-label', `Вопрос ${orderIndex + 1}, исходный номер ${question.question_number}`);

        if (orderIndex === state.current) {
          button.classList.add('current');
        }
        if (state.checked[questionIndex] === true) {
          button.classList.add('correct');
        }
        if (state.checked[questionIndex] === false) {
          button.classList.add('wrong');
        }

        button.addEventListener('click', () => {
          state.current = orderIndex;
          render();
        });

        els.navGrid.appendChild(button);
      });
    }

    function checkCurrent() {
      if (!state || questions.length === 0) {
        return;
      }

      const questionIndex = currentQuestionIndex();
      const question = questions[questionIndex];
      const selected = state.selections[questionIndex];
      if (selected.size === 0) {
        els.result.className = 'result empty';
        els.result.textContent = 'Выберите ответ';
        return;
      }
      state.checked[questionIndex] = isExactAnswer(question, selected);
      render();
    }

    function resetAll() {
      if (!state) {
        return;
      }

      state.current = 0;
      state.selections = questions.map(() => new Set());
      state.checked = questions.map(() => null);
      render();
    }

    els.startMeta.textContent = `${allQuestions.length} вопросов всего`;
    els.testOneCount.textContent = `${testOneQuestions.length} вопросов`;
    els.testTwoCount.textContent = `${testTwoQuestions.length} вопросов`;
    els.mixedCountHint.textContent = `до ${allQuestions.length} вопросов`;
    els.mixedCount.min = '0';
    els.mixedCount.max = String(allQuestions.length);
    els.mixedCount.value = String(Math.min(50, allQuestions.length));

    els.testOneBtn.addEventListener('click', () => {
      startTest(testOneQuestions, 'Тест 1');
    });

    els.testTwoBtn.addEventListener('click', () => {
      startTest(testTwoQuestions, 'Тест 2');
    });

    els.mixedBtn.addEventListener('click', () => {
      els.mixedForm.classList.remove('is-hidden');
      els.mixedError.textContent = '';
      updateMixedLimit();
      els.mixedCount.focus();
    });

    els.mixedScopeInputs.forEach(input => {
      input.addEventListener('change', updateMixedLimit);
    });

    els.mixedForm.addEventListener('submit', event => {
      event.preventDefault();
      const pool = getMixedPool();
      const count = Number(els.mixedCount.value);
      if (!Number.isInteger(count) || count < 0 || count > pool.questions.length) {
        els.mixedError.textContent = `Введите число от 0 до ${pool.questions.length}`;
        return;
      }

      startTest(getRandomQuestions(pool.questions, count), pool.label);
    });

    els.prevBtn.addEventListener('click', () => {
      if (state.current > 0) {
        state.current -= 1;
        render();
      }
    });

    els.nextBtn.addEventListener('click', () => {
      if (state.current < questions.length - 1) {
        state.current += 1;
        render();
      }
    });

    els.checkBtn.addEventListener('click', checkCurrent);
    els.resetBtn.addEventListener('click', resetAll);

    document.addEventListener('keydown', event => {
      if (!state || els.testApp.classList.contains('is-hidden')) {
        return;
      }

      if (event.key === 'ArrowLeft' && state.current > 0) {
        state.current -= 1;
        render();
      }
      if (event.key === 'ArrowRight' && state.current < questions.length - 1) {
        state.current += 1;
        render();
      }
      if (event.key === 'Enter' && !event.target.matches('button')) {
        checkCurrent();
      }
    });
  </script>
</body>
</html>
